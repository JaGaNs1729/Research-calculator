<!-- Rest of your HTML is identical -->

<script>
'use strict';

// ====================== YOUR ORIGINAL STATE & CONSTANTS ======================
let expr = '';
let histArr = JSON.parse(localStorage.getItem('jrc_hist') || '[]');
let donateAmt = '5';
let uVal = '0';

const DEFAULT_CONSTS = [ /* your original constants */ ];
let userConsts = JSON.parse(localStorage.getItem('jrc_consts') || 'null') || DEFAULT_CONSTS.map(c => ({...c}));

// ====================== NEW: AUTO-REORDER CONSTANTS ======================
function insertConst(i) {
  const c = userConsts[i];
  if (!c.value) { toast('⚠️ This constant has no value yet'); return; }
  setDisplay(expr + c.value);
  toast(`✅ ${c.name} = ${c.value}`);

  // ←←← AUTO MOVE TO TOP ←←←
  const used = userConsts.splice(i, 1)[0];
  userConsts.unshift(used);
  saveConsts();
  renderConstList();
}

// (rest of your original functions unchanged until fmt)

function fmt(v, d = 10) {
  if (v === undefined || v === null) return 'undefined';
  if (typeof v === 'string') return v;
  if (isNaN(v)) return 'NaN';
  if (!isFinite(v)) return v > 0 ? '∞' : '-∞';
  const r = parseFloat(v.toPrecision(d));
  return r.toString();
}

// ====================== NEW: INSERT VALUE FROM “ALL” TABLES ======================
function insertAllValue(val) {
  if (!val || val === 'NaN' || val === '∞') return;
  setDisplay(expr + val);
  toast('✅ Value inserted – use + − × ÷');
}

// ====================== FIXED LOG/EXP ALL TABLE ======================
function calcAllLog() {
  if (!expr) { toast('Enter a value first'); return; }
  let x;
  try { x = mathEval(expr); } catch (e) { toast('❌ Invalid value'); return; }

  const isValidLog = x > 0;

  const fns = [
    ['ln(x)', isValidLog ? Math.log(x) : NaN],
    ['log₁₀(x)', isValidLog ? Math.log10(x) : NaN],
    ['log₂(x)', isValidLog ? Math.log2(x) : NaN],
    ['exp(x)', Math.exp(x)],
    ['√x', Math.sqrt(x)],
    ['∛x', Math.cbrt(x)],
    ['x²', x * x],
    ['x³', x * x * x],
    ['1/x', 1 / x],
    ['|x|', Math.abs(x)],
    ['x!', _fact(Math.round(x))],
    ['Γ(x)', _gamma(x)],
  ];

  if (!isValidLog) {
    document.getElementById('logAllGrid').innerHTML = 
      `<div style="grid-column:span 2;color:var(--red);padding:8px;">Log functions require x > 0<br>(ln, log₁₀, log₂)</div>`;
  } else {
    document.getElementById('logAllGrid').innerHTML = fns.map(([l, v]) =>
      `<div class="r-cell" onclick="insertAllValue('\( {fmt(v)}')"><div class="lbl"> \){l}</div><div class="val">${fmt(v)}</div></div>`
    ).join('');
  }
  document.getElementById('logAllOut').style.display = 'block';
}

// ====================== UPDATED TRIG & HYP ALL TABLES (clickable) ======================
function calcAllTrig() {
  if (!expr) { toast('Enter a value first'); return; }
  let x; try { x = mathEval(expr); } catch(e){ toast('❌ Invalid'); return; }
  const fns = [ /* your original trig functions */ ];
  document.getElementById('trigAllGrid').innerHTML = fns.map(([l, v]) =>
    `<div class="r-cell" onclick="insertAllValue('\( {fmt(v)}')"><div class="lbl"> \){l}</div><div class="val">${fmt(v)}</div></div>`
  ).join('');
  document.getElementById('trigAllOut').style.display = 'block';
}

function calcAllHyp() {
  if (!expr) { toast('Enter a value first'); return; }
  let x; try { x = mathEval(expr); } catch(e){ toast('❌ Invalid'); return; }
  const fns = [ /* your original hyp functions */ ];
  document.getElementById('hypAllGrid').innerHTML = fns.map(([l, v]) =>
    `<div class="r-cell" onclick="insertAllValue('\( {fmt(v)}')"><div class="lbl"> \){l}</div><div class="val">${fmt(v)}</div></div>`
  ).join('');
  document.getElementById('hypAllOut').style.display = 'block';
}

// ====================== IMPROVED LARGE POWER HANDLING ======================
function calculate() {
  if (!expr) return;
  setHist(expr + ' =');
  try {
    let r = mathEval(expr);

    if (!isFinite(r) && r > 0) {
      setResult('∞');
      document.getElementById('dNote').textContent = 'Too large for floating-point (e.g. 2^2000). Use log₁₀ for approx.';
      addHist(expr, '∞ (too large)');
      return;
    }

    const disp = fmt(r, 12);
    setResult(disp);
    let note = '';
    if (isFinite(r) && r !== 0) {
      const ab = Math.abs(r);
      if (ab >= 1e15 || ab < 1e-9) note = '≈ ' + r.toExponential(6);
    }
    document.getElementById('dNote').textContent = note;
    addHist(expr, disp);
  } catch (e) {
    setResult('');
    document.getElementById('dNote').textContent = '❌ Check expression';
  }
}

// ====================== REST OF YOUR ORIGINAL SCRIPT (unchanged) ======================
// ... (all other functions, tabs, history, donate, theme, etc. remain exactly as you wrote them)

buildMatUI('A'); buildMatUI('B'); buildUnitSels(); renderConstList();
// Restore theme (your original code)
</script>
</body>
